[build]
command = "npm install --no-package-lock && npm --prefix frontend ci && npm --prefix frontend run build"
publish = "frontend/.next"
functions = "netlify/functions"

[build.environment]
NODE_VERSION = "20"

[functions]
node_bundler = "esbuild"
included_files = ["dataroom/manifest.json", "dataroom/processed/**"]

[[plugins]]
package = "@netlify/plugin-nextjs"
